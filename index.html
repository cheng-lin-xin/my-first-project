<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Project</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --panel: #fffdf8;
      --text: #1f2937;
      --accent: #c2410c;
      --border: #eadfce;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #fff7ed, var(--bg));
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 720px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <main>
    <div class="tag">GitHub 入门测试项目</div>
    <h1>Hello, GitHub</h1>
    <p>这个页面用于验证本地项目创建、Git 初始化、提交，以及后续推送到 GitHub 的完整流程。</p>
    <p>如果你能在 GitHub 仓库里看到这个文件，说明整个基础流程已经打通。</p>
  </main>
</body>
</html>
